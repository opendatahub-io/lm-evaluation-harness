name: Generate Task List

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to use for lm-evaluation-harness'
        required: false
        default: 'main'
        type: string

jobs:
  generate-task-list:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Checkout opendatahub-tests repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: opendatahub-io/opendatahub-tests
        path: ./opendatahub-tests

    - name: Set Date-Time Environment Variable
      run: echo "CURRENT_DATE_TIME=$(date -u +'%Y-%m-%dT%H-%M-%SZ')" >> "$GITHUB_ENV"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml>=6.0

    - name: Generate task list
      run: |
        chmod +x tests/tasks/generate_task_list.sh
        tests/tasks/generate_task_list.sh

    - name: Group tasks by dataset
      run: |
        python3 tests/tasks/group_tasks_by_dataset.py

    - name: Copy generated CSVs to opendatahub-tests
      run: |
        mkdir -p ./opendatahub-tests/tests/model_explainability/lm_eval/data
        cp tasks/updated_tasks/task_list_${{ env.CURRENT_DATE_TIME }}.csv ./opendatahub-tests/tests/model_explainability/lm_eval/data/
        cp tasks/updated_tasks/dataset_groupings_${{ env.CURRENT_DATE_TIME }}.csv ./opendatahub-tests/tests/model_explainability/lm_eval/data/
        echo "Copied CSV files to opendatahub-tests repository"

    - name: Configure Git
      run: |
        cd ./opendatahub-tests
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -b "update-task-list"
        git add tests/model_explainability/lm_eval/data/*.csv
        git commit -m "Update task list and dataset groupings from lm-evaluation-harness branch ${{ github.event.inputs.branch }}"
        git push origin "update-task-list"
        echo "Branch 'update-task-list' created and pushed"

    - name: Create pull request
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd ./opendatahub-tests
        gh pr create \
          --title "Update task list and dataset groupings from lm-evaluation-harness" \
          --body "This PR updates the task list and dataset groupings from lm-evaluation-harness ${{ github.event.inputs.branch }}" \
          --base main \
          --head "update-task-list"

    - name: Remove updated task directory
      run: |
        echo "Cleaning up updated task directory"
        rm -rf tasks/updated_tasks
        echo "Updated task directory removed"
